<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <!-- Warm Peach-to-Coral Background Gradient -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#f8c9a8" />
            <stop offset="35%" stop-color="#f5b99a" />
            <stop offset="65%" stop-color="#f09a8d" />
            <stop offset="100%" stop-color="#e8737a" />
        </linearGradient>

        <!-- Frosty inner glow overlay -->
        <radialGradient id="frostGlow" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
            <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
        </radialGradient>

        <!-- Subtle inner vignette -->
        <radialGradient id="innerShadow" cx="50%" cy="100%" r="70%">
            <stop offset="0%" stop-color="#000000" stop-opacity="0" />
            <stop offset="70%" stop-color="#000000" stop-opacity="0" />
            <stop offset="100%" stop-color="#000000" stop-opacity="0.12" />
        </radialGradient>

        <!-- Chef hat main body gradient -->
        <linearGradient id="hatBodyGrad" x1="30%" y1="0%" x2="70%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="30%" stop-color="#fafafa" />
            <stop offset="70%" stop-color="#eeeeee" />
            <stop offset="100%" stop-color="#e0e0e0" />
        </linearGradient>

        <!-- Left side hat body shadow -->
        <linearGradient id="hatBodyLeftShade" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#d0d0d0" />
            <stop offset="40%" stop-color="#e8e8e8" stop-opacity="0" />
        </linearGradient>

        <!-- Right side hat body shadow -->
        <linearGradient id="hatBodyRightShade" x1="100%" y1="0%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#d8d8d8" />
            <stop offset="35%" stop-color="#e8e8e8" stop-opacity="0" />
        </linearGradient>

        <!-- Puff highlight gradient -->
        <radialGradient id="puffHighlight" cx="45%" cy="35%" r="50%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="50%" stop-color="#f8f8f8" />
            <stop offset="100%" stop-color="#e4e4e4" />
        </radialGradient>

        <!-- Hat band gradient -->
        <linearGradient id="hatBandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f2f2f2" />
            <stop offset="30%" stop-color="#ececec" />
            <stop offset="70%" stop-color="#e0e0e0" />
            <stop offset="100%" stop-color="#d5d5d5" />
        </linearGradient>

        <!-- Band left shadow -->
        <linearGradient id="bandLeftShade" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#c8c8c8" />
            <stop offset="25%" stop-color="#e0e0e0" stop-opacity="0" />
        </linearGradient>

        <!-- Band right shadow -->
        <linearGradient id="bandRightShade" x1="100%" y1="0%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#cccccc" />
            <stop offset="25%" stop-color="#e0e0e0" stop-opacity="0" />
        </linearGradient>

        <!-- Drop shadow filter for hat -->
        <filter id="hatShadow" x="-25%" y="-15%" width="150%" height="150%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="14" />
            <feOffset dx="0" dy="10" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Subtle blur for soft shadows -->
        <filter id="softBlur">
            <feGaussianBlur stdDeviation="3" />
        </filter>
    </defs>

    <!-- === BACKGROUND === -->
    <rect width="512" height="512" rx="120" ry="120" fill="url(#bgGrad)" />
    <rect width="512" height="512" rx="120" ry="120" fill="url(#frostGlow)" />
    <rect width="512" height="512" rx="120" ry="120" fill="url(#innerShadow)" />

    <!-- Frosted glass border -->
    <rect x="1" y="1" width="510" height="510" rx="119" ry="119" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3" />

    <!-- === CHEF HAT (wider, more realistic) === -->
    <g filter="url(#hatShadow)" transform="translate(256, 230)">

        <!-- ── HAT BAND (wide bottom rectangle) ── -->
        <rect x="-95" y="30" width="190" height="65" rx="5" ry="5" fill="url(#hatBandGrad)" />
        <!-- Band left edge shade -->
        <rect x="-95" y="30" width="190" height="65" rx="5" ry="5" fill="url(#bandLeftShade)" opacity="0.5" />
        <!-- Band right edge shade -->
        <rect x="-95" y="30" width="190" height="65" rx="5" ry="5" fill="url(#bandRightShade)" opacity="0.4" />
        <!-- Band top highlight line -->
        <rect x="-95" y="30" width="190" height="3" rx="1.5" fill="#ffffff" opacity="0.7" />
        <!-- Band bottom edge -->
        <rect x="-95" y="92" width="190" height="2" rx="1" fill="#bebebe" opacity="0.4" />
        <!-- Band subtle horizontal stitch -->
        <rect x="-88" y="60" width="176" height="1" rx="0.5" fill="#d5d5d5" opacity="0.35" />

        <!-- ── HAT BODY (billowy shape connecting band to puffs) ── -->
        <path d="
            M-88,32
            C-88,5 -82,-20 -68,-48
            C-55,-72 -38,-92 -18,-108
            C-8,-115 8,-115 18,-108
            C38,-92 55,-72 68,-48
            C82,-20 88,5 88,32
            Z
        " fill="url(#hatBodyGrad)" />

        <!-- Body left shading for 3D roundness -->
        <path d="
            M-88,32
            C-88,5 -82,-20 -68,-48
            C-55,-72 -38,-92 -18,-108
            C-8,-115 8,-115 18,-108
            C38,-92 55,-72 68,-48
            C82,-20 88,5 88,32
            Z
        " fill="url(#hatBodyLeftShade)" opacity="0.45" />

        <!-- Body right shading -->
        <path d="
            M-88,32
            C-88,5 -82,-20 -68,-48
            C-55,-72 -38,-92 -18,-108
            C-8,-115 8,-115 18,-108
            C38,-92 55,-72 68,-48
            C82,-20 88,5 88,32
            Z
        " fill="url(#hatBodyRightShade)" opacity="0.35" />

        <!-- ── PUFFY TOP LOBES ── -->
        <!-- Center big puff -->
        <ellipse cx="0" cy="-105" rx="52" ry="44" fill="url(#puffHighlight)" />
        <!-- Left puff -->
        <ellipse cx="-48" cy="-78" rx="44" ry="38" fill="url(#puffHighlight)" />
        <!-- Right puff -->
        <ellipse cx="48" cy="-78" rx="44" ry="38" fill="url(#puffHighlight)" />
        <!-- Far left small puff -->
        <ellipse cx="-72" cy="-48" rx="28" ry="24" fill="url(#puffHighlight)" />
        <!-- Far right small puff -->
        <ellipse cx="72" cy="-48" rx="28" ry="24" fill="url(#puffHighlight)" />
        <!-- Extra left-center puff to fill gap -->
        <ellipse cx="-28" cy="-95" rx="30" ry="28" fill="url(#puffHighlight)" />
        <!-- Extra right-center puff -->
        <ellipse cx="28" cy="-95" rx="30" ry="28" fill="url(#puffHighlight)" />

        <!-- Smooth fill between puffs and body -->
        <path d="
            M-80,-30
            C-75,-52 -58,-72 -35,-88
            C-15,-100 15,-100 35,-88
            C58,-72 75,-52 80,-30
            C78,-8 72,12 68,30
            L-68,30
            C-72,12 -78,-8 -80,-30
            Z
        " fill="url(#hatBodyGrad)" opacity="0.8" />

        <!-- ── FOLD/CREASE LINES for realism ── -->
        <!-- Center fold -->
        <path d="M0,-112 C-1,-75 0,-35 0,30" stroke="#d0d0d0" stroke-width="1.3" fill="none" opacity="0.3" />
        <!-- Left folds -->
        <path d="M-25,-100 C-24,-65 -22,-30 -20,30" stroke="#d2d2d2" stroke-width="1.2" fill="none" opacity="0.25" />
        <path d="M-50,-78 C-48,-50 -44,-20 -42,30" stroke="#d5d5d5" stroke-width="1" fill="none" opacity="0.22" />
        <path d="M-70,-45 C-67,-25 -64,-5 -62,30" stroke="#d8d8d8" stroke-width="0.8" fill="none" opacity="0.18" />
        <!-- Right folds -->
        <path d="M25,-100 C24,-65 22,-30 20,30" stroke="#d2d2d2" stroke-width="1.2" fill="none" opacity="0.25" />
        <path d="M50,-78 C48,-50 44,-20 42,30" stroke="#d5d5d5" stroke-width="1" fill="none" opacity="0.22" />
        <path d="M70,-45 C67,-25 64,-5 62,30" stroke="#d8d8d8" stroke-width="0.8" fill="none" opacity="0.18" />

        <!-- ── HIGHLIGHTS on puff tops (glossy 3D look) ── -->
        <ellipse cx="-10" cy="-115" rx="22" ry="12" fill="#ffffff" opacity="0.5" />
        <ellipse cx="-52" cy="-88" rx="16" ry="9" fill="#ffffff" opacity="0.4" />
        <ellipse cx="44" cy="-88" rx="16" ry="9" fill="#ffffff" opacity="0.35" />
        <ellipse cx="-72" cy="-55" rx="10" ry="6" fill="#ffffff" opacity="0.3" />
        <ellipse cx="72" cy="-55" rx="10" ry="6" fill="#ffffff" opacity="0.28" />

        <!-- Subtle crease shadow where puffs meet body -->
        <path d="M-75,-25 C-55,-42 -25,-52 0,-54 C25,-52 55,-42 75,-25"
              stroke="#b8b8b8" stroke-width="2.5" fill="none" opacity="0.15" filter="url(#softBlur)" />

        <!-- Rim highlight at very top -->
        <path d="M-35,-118 C-15,-132 15,-132 35,-118"
              stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round" />

    </g>

    <!-- === TYPOGRAPHY === -->
    <text x="256" y="410"
          font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Inter', 'Montserrat', 'Segoe UI', Arial, sans-serif"
          font-weight="700" font-size="38" fill="#ffffff" text-anchor="middle" letter-spacing="3" opacity="0.95">
        CHEF PLANET
    </text>

    <text x="256" y="445"
          font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Inter', 'Montserrat', 'Segoe UI', Arial, sans-serif"
          font-weight="500" font-size="14" fill="#ffffff" text-anchor="middle" letter-spacing="10" opacity="0.6">
        FOOD DELIVERY
    </text>
</svg>
