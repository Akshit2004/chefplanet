name: chef_plannet
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  lucide_icons: ^0.257.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.4
  mongo_dart: ^0.10.8
  flutter_dotenv: ^5.1.0
  provider: ^6.1.5+1
  logging: ^1.3.0
  razorpay_flutter: ^1.3.7
  rive: ^0.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#f5b99a"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/rive/
